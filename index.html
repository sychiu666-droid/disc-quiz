<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 動物人格測驗</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  .container {
    background: white;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-width: 660px;
    width: 100%;
    overflow: hidden;
  }

  /* ── WELCOME ── */
  #screen-welcome { padding: 48px 40px; text-align: center; }

  .logo { font-size: 64px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  h1 { font-size: 2rem; font-weight: 900; color: #1a202c; margin-bottom: 8px; }
  .subtitle { font-size: 1rem; color: #718096; margin-bottom: 32px; line-height: 1.7; }

  .animals-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .a-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .a-chip .icon { font-size: 2rem; }
  .chip-d { background: #fff0f0; color: #c53030; }
  .chip-i { background: #fff8e6; color: #b7791f; }
  .chip-s { background: #f0fff4; color: #276749; }
  .chip-c { background: #ebf8ff; color: #2c5282; }

  .info-box {
    background: #f7f8ff;
    border: 1.5px solid #e0e5ff;
    border-radius: 14px;
    padding: 16px 20px;
    font-size: 0.88rem;
    color: #4a5568;
    line-height: 1.7;
    margin-bottom: 28px;
    text-align: left;
  }
  .info-box strong { color: #5a67d8; }

  .btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 16px 52px;
    font-size: 1.1rem;
    font-weight: 800;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(102,126,234,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(102,126,234,0.5); }

  /* ── QUIZ ── */
  #screen-quiz { display: none; }

  .quiz-top {
    padding: 20px 28px 16px;
    border-bottom: 1px solid #e8ecf4;
    background: #fafbff;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .q-label { font-size: 0.82rem; font-weight: 700; color: #718096; }
  .q-num   { font-size: 0.82rem; font-weight: 700; color: #667eea; }

  .progress-bar { background: #e2e8f0; border-radius: 999px; height: 7px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 999px;
    transition: width 0.35s ease;
  }

  .quiz-body { padding: 28px; }

  .q-prompt {
    font-size: 0.82rem;
    color: #a0aec0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .q-title {
    font-size: 1.2rem;
    font-weight: 800;
    color: #2d3748;
    margin-bottom: 22px;
    line-height: 1.4;
  }

  /* ── 詞語題 2×2 ── */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .opt-card {
    border: 2px solid #e2e8f0;
    border-radius: 16px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    background: white;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 88px;
    justify-content: center;
  }
  .opt-card:hover { border-color:#667eea; background:#f7f8ff; transform:translateY(-2px); box-shadow:0 4px 12px rgba(102,126,234,0.15); }
  .opt-card.selected { border-color:#5a67d8; background:linear-gradient(135deg,#eef2ff,#f5f0ff); box-shadow:0 0 0 3px rgba(102,126,234,0.15); }
  .opt-card.selected .opt-letter { background:#5a67d8; color:white; }

  .opt-letter {
    width:28px; height:28px; border-radius:50%;
    background:#edf2f7; color:#4a5568;
    font-size:0.78rem; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.15s;
  }
  .opt-word { font-size:1rem; font-weight:700; color:#2d3748; line-height:1.3; }

  /* ── 情境題 vertical ── */
  .options-list { display: flex; flex-direction: column; gap: 10px; }

  .opt-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    background: white;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .opt-row:hover { border-color:#667eea; background:#f7f8ff; transform:translateX(4px); }
  .opt-row.selected { border-color:#5a67d8; background:linear-gradient(135deg,#eef2ff,#f5f0ff); box-shadow:0 0 0 3px rgba(102,126,234,0.12); }
  .opt-row.selected .opt-letter { background:#5a67d8; color:white; }

  .opt-icon-box {
    width:38px; height:38px; border-radius:10px;
    background:#f0f2ff;
    display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; flex-shrink:0;
  }
  .opt-sentence { font-size:0.95rem; font-weight:600; color:#2d3748; line-height:1.4; }

  .btn-next {
    display:block; width:100%; margin-top:24px; padding:14px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white; border:none; border-radius:14px;
    font-size:1rem; font-weight:800; cursor:pointer;
    transition:all 0.15s; opacity:0.4; pointer-events:none;
  }
  .btn-next.active { opacity:1; pointer-events:all; }
  .btn-next.active:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(102,126,234,0.4); }

  /* ── RESULT ── */
  #screen-result { display:none; }

  .result-header {
    padding: 36px 32px 32px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .result-header::after {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.18) 0%, transparent 70%);
  }
  .r-badge {
    display:inline-block;
    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(4px);
    padding:5px 18px; border-radius:50px;
    font-size:0.78rem; font-weight:800; letter-spacing:2px;
    margin-bottom:10px; position:relative; z-index:1;
  }
  .r-animal {
    display:flex; align-items:center; justify-content:center;
    margin:4px auto 8px; position:relative; z-index:1;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,0.28));
  }
  .r-animal svg { width:150px; height:150px; }
  .r-name { font-size:2.2rem; font-weight:900; margin-bottom:5px; position:relative; z-index:1; }
  .r-line { font-size:1rem; opacity:0.9; position:relative; z-index:1; }

  .result-body { padding:28px 28px 36px; }

  .section { margin-bottom:24px; }
  .section-title {
    font-size:0.78rem; font-weight:800; color:#a0aec0;
    text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px;
  }

  /* Scores */
  .score-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .score-lbl { width:80px; font-size:0.82rem; font-weight:700; color:#4a5568; flex-shrink:0; }
  .score-track { flex:1; background:#e8ecf4; border-radius:999px; height:10px; overflow:hidden; }
  .score-bar { height:100%; border-radius:999px; width:0; transition:width 1.1s cubic-bezier(.25,.8,.25,1) 0.2s; }
  .bar-d { background:linear-gradient(90deg,#fc8181,#e53e3e); }
  .bar-i { background:linear-gradient(90deg,#f6e05e,#d69e2e); }
  .bar-s { background:linear-gradient(90deg,#68d391,#38a169); }
  .bar-c { background:linear-gradient(90deg,#63b3ed,#3182ce); }
  .score-val { width:32px; text-align:right; font-size:0.82rem; font-weight:800; color:#4a5568; }

  /* Traits */
  .traits-wrap { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .trait-pill {
    display:flex; align-items:center; gap:6px;
    padding:9px 12px; background:#f7fafc; border-radius:10px;
    font-size:0.83rem; font-weight:700; color:#4a5568;
  }

  /* Desc */
  .desc-card {
    background:#f7fafc; border-radius:16px;
    padding:18px 20px; font-size:0.93rem; color:#4a5568;
    line-height:1.75; white-space:pre-line;
  }

  /* Career section */
  .career-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .career-card {
    border-radius:14px; padding:14px 16px;
    font-size:0.88rem; color:#4a5568; line-height:1.6;
  }
  .career-card-title {
    font-size:0.75rem; font-weight:800; text-transform:uppercase;
    letter-spacing:1px; margin-bottom:8px;
  }
  .career-tag {
    display:inline-block;
    padding:4px 10px; border-radius:20px;
    font-size:0.78rem; font-weight:700;
    margin:3px 3px 3px 0;
  }

  /* Tip */
  .tip-card {
    border-radius:14px; padding:16px 18px;
    font-size:0.9rem; color:#4a5568; line-height:1.65;
    border-left:4px solid;
  }
  .tip-head { font-weight:800; margin-bottom:5px; }

  .btn-again {
    display:block; width:100%; padding:14px;
    background:#edf2f7; color:#4a5568; border:none;
    border-radius:14px; font-size:0.97rem; font-weight:800;
    cursor:pointer; transition:background 0.15s; margin-top:8px;
  }
  .btn-again:hover { background:#e2e8f0; }

  @media (max-width:480px) {
    #screen-welcome { padding:36px 22px; }
    .quiz-body { padding:20px; }
    .result-body { padding:20px 20px 32px; }
    h1 { font-size:1.65rem; }
    .traits-wrap { grid-template-columns:1fr 1fr; }
    .options-grid { grid-template-columns:1fr 1fr; }
    .opt-card { padding:14px 10px; min-height:76px; }
    .opt-word { font-size:0.92rem; }
    .career-grid { grid-template-columns:1fr; }
    .r-animal svg { width:120px; height:120px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ── WELCOME ── -->
  <div id="screen-welcome">
    <div class="logo">🐾</div>
    <h1>你是什麼動物？</h1>
    <p class="subtitle">透過 30 道題目，探索你的 DISC 人格類型<br>看看你最像哪一種動物！</p>
    <div class="animals-row">
      <div class="a-chip chip-d"><span class="icon">🐯</span>老虎 D型</div>
      <div class="a-chip chip-i"><span class="icon">🦚</span>孔雀 I型</div>
      <div class="a-chip chip-s"><span class="icon">🐨</span>無尾熊 S型</div>
      <div class="a-chip chip-c"><span class="icon">🦉</span>貓頭鷹 C型</div>
    </div>
    <div class="info-box">
      📝 共 <strong>30 題</strong>，包含<strong>詞語選擇</strong>與<strong>情境題</strong>兩種形式。<br>
      每題選出最符合你的答案，憑直覺選就好！
    </div>
    <button class="btn-primary" onclick="startQuiz()">開始測驗 →</button>
  </div>

  <!-- ── QUIZ ── -->
  <div id="screen-quiz">
    <div class="quiz-top">
      <div class="q-meta">
        <span class="q-label" id="q-label">選出最符合你的詞語</span>
        <span class="q-num"   id="q-num">1 / 30</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog" style="width:0%"></div>
      </div>
    </div>
    <div class="quiz-body">
      <div class="q-prompt">第 <span id="q-idx">1</span> 題</div>
      <div class="q-title" id="q-title">以下哪個詞語，最能描述你？</div>
      <div id="opts"></div>
      <button class="btn-next" id="btn-next" onclick="next()">下一題 →</button>
    </div>
  </div>

  <!-- ── RESULT ── -->
  <div id="screen-result">
    <div class="result-header" id="r-header">
      <div class="r-badge" id="r-badge"></div>
      <div class="r-animal" id="r-emoji"></div>
      <div class="r-name"  id="r-name"></div>
      <div class="r-line"  id="r-line"></div>
    </div>
    <div class="result-body">

      <div class="section">
        <div class="section-title">📊 四個維度得分</div>
        <div class="score-row">
          <span class="score-lbl">🐯 D 支配</span>
          <div class="score-track"><div class="score-bar bar-d" id="bar-d"></div></div>
          <span class="score-val" id="val-d">0</span>
        </div>
        <div class="score-row">
          <span class="score-lbl">🦚 I 影響</span>
          <div class="score-track"><div class="score-bar bar-i" id="bar-i"></div></div>
          <span class="score-val" id="val-i">0</span>
        </div>
        <div class="score-row">
          <span class="score-lbl">🐨 S 穩健</span>
          <div class="score-track"><div class="score-bar bar-s" id="bar-s"></div></div>
          <span class="score-val" id="val-s">0</span>
        </div>
        <div class="score-row">
          <span class="score-lbl">🦉 C 分析</span>
          <div class="score-track"><div class="score-bar bar-c" id="bar-c"></div></div>
          <span class="score-val" id="val-c">0</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">✨ 你的核心特質</div>
        <div class="traits-wrap" id="traits"></div>
      </div>

      <div class="section">
        <div class="section-title">📖 個性說明</div>
        <div class="desc-card" id="r-desc"></div>
      </div>

      <div class="section">
        <div class="section-title">🚀 創業 ＆ 團隊職位分析</div>
        <div class="career-grid" id="r-career"></div>
      </div>

      <div class="section">
        <div class="tip-card" id="r-tip">
          <div class="tip-head" id="r-tip-head"></div>
          <div id="r-tip-body"></div>
        </div>
      </div>

      <button class="btn-again" onclick="restart()">🔄 再測一次</button>
    </div>
  </div>

</div>

    tipText:'你的穩定讓大家很安心！記得也要照顧自己的需求——勇敢說出你的想法，你的聲音同樣重要！',
  },
  C: {

    grad:'linear-gradient(135deg,#3182ce,#1a4e8a)',
    traits:[{i:'🧠',t:'邏輯思考'},{i:'🔍',t:'注重細節'},{i:'📊',t:'數據分析'},{i:'✅',t:'追求精準'},{i:'📚',t:'勤於學習'},{i:'🏅',t:'嚴謹專業'}],
    desc:`你是貓頭鷹型的精準智者！任務導向、嚴謹，追求精準與品質，是把關細節的最強守門員。\n\n✅ 優勢：注重細節、邏輯強、謹慎遵循規範、展現高度專業。\n⚠️ 弱點：完美主義讓決策較慢，對自己和他人都有很高要求。`,
    career: {
      startup: { title:'🦉 創業角色', color:'#ebf8ff', border:'#63b3ed', tag:'#dbeafe', tagText:'#2c5282',
        roles:['技術共同創辦人','產品架構師','數據與財務把關人','系統與流程建立者'] },
      team:    { title:'🏢 團隊職位', color:'#ebf8ff', border:'#63b3ed', tag:'#dbeafe', tagText:'#2c5282',
        roles:['技術長 / CTO','數據分析師','財務長 / CFO','品質保證主管'] },
    },
    tipBg:'#ebf8ff', tipBorder:'#63b3ed', tipHead:'💡 成長提示',
    tipText:'你的嚴謹令人敬佩！試著接受「夠好就可以開始」——完美可以在過程中慢慢打磨，行動本身就是進步！',
  },
};

// ── 變色龍組合描述 ────────────────────────────────────────────
const ChameleonCombos = {
  'DI':{ line:'行動力與感染力兼具，天生的明星領袖！',
    desc:`你同時擁有老虎的果斷衝勁和孔雀的熱情魅力！\n\n你能帶動場面、快速做決定，又擅長說服和激勵別人。大家既敬佩又喜歡跟著你走，天生就適合站在舞台中央！`,
    career:{ startup:['共同創辦人（衝鋒型）','業務 ✕ 品牌雙軌負責人'], team:['執行長 / CEO','行銷業務雙棲主管'] }},
  'DS':{ line:'剛柔並濟，兼顧目標與人情的全才！',
    desc:`你結合了老虎的執行力和無尾熊的溫暖體貼！\n\n追求目標時不忘照顧身邊的人，能帶領團隊又讓大家感到安心。你是最受信賴的核心人物！`,
    career:{ startup:['創辦人（平衡型）','文化 ✕ 績效雙軌負責人'], team:['執行長 / CEO','人才發展主管'] }},
  'DC':{ line:'高標準、強執行，追求卓越的完美戰士！',
    desc:`你同時有老虎的行動力和貓頭鷹的嚴謹思維！\n\n你做事又快又精準，不只要達成目標，還要做到最好。計劃縝密又能快速推進，是強大的戰略型人才！`,
    career:{ startup:['技術型創辦人','產品 ✕ 執行雙軌主導'], team:['技術長 / CTO','策略長 / CSO'] }},
  'IS':{ line:'溫暖又開朗，讓每個人都愛上你的存在！',
    desc:`你結合了孔雀的活力熱情和無尾熊的溫柔體貼！\n\n既能帶動氣氛，又真心關心每個人的感受。人人都喜歡和你在一起，你是團體裡的暖心核心！`,
    career:{ startup:['社群與社群經理','品牌形象守護者'], team:['人力資源主管','客戶成功長'] }},
  'IC':{ line:'創意與邏輯兼備，充滿魅力的思考達人！',
    desc:`你同時有孔雀的表達創意和貓頭鷹的分析深度！\n\n能把複雜的道理說得生動有趣，讓人聽得入迷又受益。你是最懂得把知識變成影響力的人！`,
    career:{ startup:['產品行銷創辦人','內容策略核心'], team:['行銷長 / CMO','產品經理'] }},
  'SC':{ line:'穩如磐石，最值得信賴的幕後功臣！',
    desc:`你結合了無尾熊的耐心包容和貓頭鷹的細心嚴謹！\n\n你不喜歡出風頭，但你的付出和品質讓整個團隊穩如泰山。有你在就不會出錯！`,
    career:{ startup:['財務與營運共同創辦人','系統與流程建立者'], team:['財務長 / CFO','品保主管 / 法務'] }},
};

function buildChameleon(types) {
  const sorted = [...types].sort();
  const key = sorted.slice(0,2).join('');
  const combo = ChameleonCombos[key] || {};
  const typeNames = { D:'老虎🐯', I:'孔雀🦚', S:'無尾熊🐨', C:'貓頭鷹🦉' };
  const typeLabels = { D:'D 支配', I:'I 影響', S:'S 穩健', C:'C 分析' };
  const namesStr = sorted.map(t=>typeNames[t]).join(' ＋ ');
  const badgeStr = sorted.map(t=>typeLabels[t]).join(' × ');
  const mergedTraits = [];
  sorted.forEach(t => mergedTraits.push(...Animals[t].traits.slice(0,3)));
  const careerRoles = combo.career || { startup:['靈活適應各種角色'], team:['跨職能協調者'] };
  return {
    emoji:'🦎', svgKey:'chameleon',
    name:'變色龍', badge:badgeStr,
    line: combo.line || '多元人格，隨時切換最佳狀態！',
    grad:'linear-gradient(135deg,#6b46c1,#2b6cb0)',
    traits: mergedTraits,
    desc: (combo.desc || `你在 ${namesStr} 都拿到最高分！\n\n`) + `這代表你能靈活切換不同風格，隨機應變、適應各種人和情境——這正是「變色龍」最厲害的超能力！`,
    career: {
      startup: { title:'🦎 創業角色', color:'#faf5ff', border:'#b794f4', tag:'#ede9fe', tagText:'#553c9a',
        roles: careerRoles.startup },
      team:    { title:'🏢 團隊職位', color:'#ebf8ff', border:'#90cdf4', tag:'#dbeafe', tagText:'#2b6cb0',
        roles: careerRoles.team },
    },
    tipBg:'#faf5ff', tipBorder:'#b794f4', tipHead:'💡 變色龍的成長提示',
    tipText:'你的彈性是超能力！但有時「什麼都行」會讓人不確定你真正的立場。在重要時刻選擇一個主要風格，讓大家更清楚地認識你！',
  };
}

// ── 狀態 ─────────────────────────────────────────────────────
let allQs = [], cur = 0, picked = null, scores = {D:0,I:0,S:0,C:0};
const letters = ['A','B','C','D'];

function shuffle(arr) {
  return arr.map(v=>({v,r:Math.random()})).sort((a,b)=>a.r-b.r).map(x=>x.v);
}

function startQuiz() {
  allQs = shuffle([...wordQs,...scenarioQs]).map(q=>({...q, opts:shuffle([...q.opts])}));
  cur=0; picked=null; scores={D:0,I:0,S:0,C:0};
  document.getElementById('screen-welcome').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  render();
}

function render() {
  picked = null;
  const q = allQs[cur];
  const total = allQs.length;
  const pct = Math.round(cur/total*100);
  document.getElementById('q-idx').textContent = cur+1;
  document.getElementById('q-num').textContent  = `${cur+1} / ${total}`;
  document.getElementById('prog').style.width   = pct+'%';
  if (q.type === 'word') {
    document.getElementById('q-label').textContent = '選出最符合你的詞語';
    document.getElementById('q-title').textContent = '以下哪個詞語，最能描述你？';
    renderWord(q.opts);
  } else {
    document.getElementById('q-label').textContent = '選出最符合你的情境';
    document.getElementById('q-title').textContent = q.q;
    renderScenario(q.opts);
  }
  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next';
  btn.textContent = cur===total-1 ? '查看結果 🎉' : '下一題 →';
}

function renderWord(opts) {
  const c = document.getElementById('opts');
  c.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'options-grid';
  opts.forEach((opt,i) => {
    const card = document.createElement('div');
    card.className = 'opt-card';
    card.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-word">${opt.w}</div>`;
    card.onclick = () => select(opt.t, card);
    grid.appendChild(card);
  });
  c.appendChild(grid);
}

function renderScenario(opts) {
  const c = document.getElementById('opts');
  c.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'options-list';
  opts.forEach((opt,i) => {
    const row = document.createElement('div');
    row.className = 'opt-row';
    row.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-icon-box">${opt.icon}</div><div class="opt-sentence">${opt.label}</div>`;
    row.onclick = () => select(opt.t, row);
    list.appendChild(row);
  });
  c.appendChild(list);
}

function select(type, el) {
  document.querySelectorAll('.opt-card,.opt-row').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  picked = type;
  document.getElementById('btn-next').classList.add('active');
}

function next() {
  if (!picked) return;
  scores[picked]++;
  cur++;
  if (cur >= allQs.length) showResult();
  else render();
}

function showResult() {
  document.getElementById('screen-quiz').style.display  = 'none';
  document.getElementById('screen-result').style.display = 'block';

  const max = Math.max(...Object.values(scores));
  const winners = Object.keys(scores).filter(k=>scores[k]===max);
  const a = winners.length >= 2 ? buildChameleon(winners) : Animals[winners[0]];

  // Header
  document.getElementById('r-header').style.background = a.grad;
  document.getElementById('r-badge').textContent = a.badge;
  document.getElementById('r-emoji').innerHTML   = SVGs[a.svgKey] || `<span style="font-size:72px">${a.emoji}</span>`;
  document.getElementById('r-name').textContent  = `你是 ${a.name}！`;
  document.getElementById('r-line').textContent  = a.line;

  // Bars
  setTimeout(() => {
    ['D','I','S','C'].forEach(k => {
      const pct = Math.round(scores[k]/allQs.length*100);
      document.getElementById('bar-'+k.toLowerCase()).style.width = pct+'%';
      document.getElementById('val-'+k.toLowerCase()).textContent = scores[k];
    });
  }, 120);

  // Traits
  const tw = document.getElementById('traits');
  tw.innerHTML = '';
  a.traits.forEach(tr => {
    const p = document.createElement('div');
    p.className = 'trait-pill';
    p.innerHTML = `<span>${tr.i}</span>${tr.t}`;
    tw.appendChild(p);
  });

  // Desc
  document.getElementById('r-desc').textContent = a.desc;

  // Career
  const cg = document.getElementById('r-career');
  cg.innerHTML = '';
  ['startup','team'].forEach(key => {
    const c = a.career[key];
    const card = document.createElement('div');
    card.className = 'career-card';
    card.style.cssText = `background:${c.color};border:1.5px solid ${c.border};border-radius:14px;padding:14px 16px;`;
    const tagsHTML = c.roles.map(r =>
      `<span class="career-tag" style="background:${c.tag};color:${c.tagText};">${r}</span>`
    ).join('');
    card.innerHTML = `<div class="career-card-title" style="color:${c.tagText}">${c.title}</div>${tagsHTML}`;
    cg.appendChild(card);
  });

  // Tip
  const tip = document.getElementById('r-tip');
  tip.style.background   = a.tipBg;
  tip.style.borderColor  = a.tipBorder;
  document.getElementById('r-tip-head').textContent = a.tipHead;
  document.getElementById('r-tip-body').textContent = a.tipText;

  window.scrollTo({ top:0, behavior:'smooth' });
}

function restart() {
  document.getElementById('screen-result').style.display  = 'none';
  document.getElementById('screen-welcome').style.display = 'block';
}
</script>
